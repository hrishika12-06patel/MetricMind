entity:
  name: region

  display_name: Region

  description: >
    Represents the geographical area where customer orders are placed.
    This entity enables regional analysis of sales, profit, customers,
    and business performance.

  source:
    table: orders

  primary_key: region

  attributes:
    - region

  relationships:
    - contains: customer
    - contains: order

  business_use:
    - Regional sales analysis
    - Regional profit analysis
    - Customer distribution
    - Business performance by region