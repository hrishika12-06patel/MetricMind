entity:
  name: segment

  display_name: Customer Segment

  description: >
    Represents the classification of customers based on business
    criteria. Segments help analyze purchasing behavior, sales,
    and profitability across different customer groups.

  source:
    table: orders

  primary_key: segment

  attributes:
    - segment

  relationships:
    - has_many: customer

  business_use:
    - Customer segmentation
    - Sales by segment
    - Profit by segment
    - Marketing analysis