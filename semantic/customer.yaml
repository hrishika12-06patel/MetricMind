entity:
  name: customer

  display_name: Customer

  description: >
    Represents customers who purchase products from the business.
    This entity is used to analyze customer behavior, purchasing
    patterns, customer segmentation, and revenue contribution.

  source:
    table: orders

  primary_key: customer_id

  attributes:
    - customer_id
    - customer_name
    - segment
    - region

  relationships:
    - places: order
    - belongs_to: segment

  business_use:
    - Customer analysis
    - Customer segmentation
    - Revenue by customer
    - Customer purchase history