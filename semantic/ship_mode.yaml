entity:
  name: ship_mode

  display_name: Ship Mode

  description: >
    Represents the shipping method used to deliver customer orders.
    This entity helps analyze delivery performance, shipping trends,
    and customer preferences.

  source:
    table: orders

  primary_key: ship_mode

  attributes:
    - ship_mode

  relationships:
    - ships: order

  business_use:
    - Shipping performance analysis
    - Delivery trend analysis
    - Order fulfillment analysis
    - Customer shipping preferences