kpi:
  name: Discount KPI

  description: >
    Measures the total discounts applied to customer orders.

  source_metric: total_discount

  calculation_logic: >
    Sum of discount amounts applied to all orders.

  business_meaning: >
    Indicates the overall discounts provided to customers.

  business_questions:
    - How much discount was given?
    - Which category received the highest discounts?
    - Which region offers the most discounts?