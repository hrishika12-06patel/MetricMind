entity:
  name: order

  display_name: Order

  description: >
    Represents a customer purchase transaction. Orders connect customers,
    products, shipping information, and business metrics such as sales,
    profit, quantity, and discounts.

  source:
    table: orders

  primary_key: order_id

  attributes:
    - order_id
    - order_date
    - customer_id
    - ship_mode
    - region

  relationships:
    - belongs_to: customer
    - contains: product
    - shipped_by: ship_mode

  business_use:
    - Order tracking
    - Revenue analysis
    - Sales reporting
    - Customer purchase analysis